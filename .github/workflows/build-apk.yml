name: Build APK

# Собирает Android APK в облаке. Запускается при пуше в main
# или вручную (вкладка Actions → Build APK → Run workflow).
# Готовый APK — в артефактах сборки (amirai-podborka-apk).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Установить зависимости
        run: npm install

      - name: Собрать веб-бандл (www/)
        run: npm run build:www

      - name: Добавить Android-платформу
        run: npx cap add android

      - name: Синхронизировать
        run: npx cap sync android

      - name: Собрать debug-APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Выложить APK в артефакты
        uses: actions/upload-artifact@v4
        with:
          name: amirai-podborka-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
