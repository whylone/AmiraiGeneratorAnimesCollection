<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amirai — генератор подборок аниме</title>
    <link rel="icon" href="/img/logo180.png" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script defer src="{{ url_for('static', filename='vendor/html-to-image.js') }}"></script>
    <script defer src="{{ url_for('static', filename='vendor/alpine.min.js') }}"></script>
</head>

<body x-data="editor()" x-cloak>
    <div class="app">

        <!-- ================= ВЕРХНЯЯ ПАНЕЛЬ ================= -->
        <header class="topbar">
            <div class="brand">
                <img src="/img/logo.png" alt="amirai" />
                <span>Amirai <small>подборки</small></span>
            </div>

            <div class="topbar-spacer"></div>

            <span class="save-badge" x-show="saved" title="Работа сохраняется автоматически в браузере">💾 автосохранение</span>

            <div class="seg" title="Формат картинки">
                <button :class="{active: format==='9:16'}" @click="setFormat('9:16')">9:16 TikTok</button>
                <button :class="{active: format==='1:1'}" @click="setFormat('1:1')">1:1 пост</button>
            </div>

            <button class="btn btn-ghost" @click="resetAll()" title="Сбросить всё и начать заново">↺ Сброс</button>
            <button class="btn" @click="exportCurrent()" :disabled="exporting">⬇ Слайд</button>
            <button class="btn btn-primary" @click="exportAll()" :disabled="exporting">
                <template x-if="exporting"><span class="spinner"></span></template>
                <span x-text="exporting ? 'Рендер…' : '⬇ Скачать всё'"></span>
            </button>
        </header>

        <!-- ================= САЙДБАР ================= -->
        <aside class="sidebar">

            <!-- ====== НАСТРОЙКИ ТИТУЛЬНОГО СЛАЙДА ====== -->
            <template x-if="slide && slide.type==='title'">
                <div style="display:flex;flex-direction:column;gap:14px">

                    <section class="section">
                        <h3>Цифра-обложка</h3>
                        <div class="row" style="justify-content:space-between;margin-bottom:8px">
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showNumber" /> Показывать цифру
                            </label>
                        </div>
                        <div class="field">
                            <label>Число (просто меняй тут)</label>
                            <input type="text" x-model="slide.bigNumber" class="big-num-input"
                                placeholder="10" />
                        </div>
                        <div class="field">
                            <label>Стиль цифры</label>
                            <div class="seg seg-wrap">
                                <button :class="{active: slide.numStyle==='solid'}" @click="slide.numStyle='solid'">Заливка</button>
                                <button :class="{active: slide.numStyle==='outline'}" @click="slide.numStyle='outline'">Контур</button>
                                <button :class="{active: slide.numStyle==='scribble'}" @click="slide.numStyle='scribble'">Скетч</button>
                                <button :class="{active: slide.numStyle==='shadow'}" @click="slide.numStyle='shadow'">Тень</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>Позиция</label>
                            <div class="seg seg-wrap">
                                <button :class="{active: slide.numPos==='tl'}" @click="slide.numPos='tl'">↖ Слева</button>
                                <button :class="{active: slide.numPos==='tr'}" @click="slide.numPos='tr'">↗ Справа</button>
                                <button :class="{active: slide.numPos==='center'}" @click="slide.numPos='center'">● Центр</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>Цвет цифры</label>
                            <div class="row">
                                <input type="color" x-model="slide.numColor" />
                                <template x-for="c in ['#ff3333','#ffd400','#ffffff','#22c55e','#2AABEE']" :key="c">
                                    <button class="swatch" :style="`background:${c}`" @click="slide.numColor=c"></button>
                                </template>
                            </div>
                        </div>
                    </section>

                    <section class="section">
                        <h3>Тексты</h3>
                        <div class="field">
                            <label>Название подборки</label>
                            <textarea x-model="slide.title"></textarea>
                        </div>
                        <div class="field">
                            <label>Подзаголовок</label>
                            <input type="text" x-model="slide.subtitle" />
                        </div>
                        <div class="field">
                            <label>Призыв (сверху, над сайтом)</label>
                            <input type="text" x-model="slide.sideText" />
                        </div>
                        <div class="field">
                            <label>Ссылка на сайт</label>
                            <input type="text" x-model="slide.siteUrl" />
                        </div>
                        <div class="row" style="gap:16px;flex-wrap:wrap">
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showLogo" /> Логотип
                            </label>
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showSides" /> Призыв
                            </label>
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showUrl" /> URL
                            </label>
                        </div>
                        <div class="field" style="margin-top:10px">
                            <label>Фон</label>
                            <select x-model="slide.bg">
                                <template x-for="(val,name) in bgPresets" :key="name">
                                    <option :value="val" x-text="name"></option>
                                </template>
                            </select>
                        </div>
                    </section>
                </div>
            </template>

            <!-- ====== НАСТРОЙКИ СЛАЙДА-СЕТКИ ====== -->
            <template x-if="slide && slide.type==='grid'">
                <div style="display:flex;flex-direction:column;gap:14px">

                    <section class="section">
                        <h3>Поиск аниме (Shikimori)</h3>
                        <form @submit.prevent="search()" class="row">
                            <input type="search" placeholder="Напр. Наруто, Магическая битва…"
                                x-model="query" />
                            <button class="btn btn-primary" type="submit">Найти</button>
                        </form>
                        <p class="hint" x-show="searchError" x-text="searchError" style="color:var(--brand-soft)"></p>
                        <p class="hint" x-show="searching"><span class="spinner"></span> Ищу…</p>

                        <div class="replace-banner" x-show="replaceCardUid">
                            <span>🔄 Режим замены — выберите аниме</span>
                            <button class="btn btn-icon btn-sm" @click="cancelReplace()" title="Отменить">✕</button>
                        </div>

                        <div class="search-results" x-show="results.length">
                            <template x-for="r in results" :key="r.id">
                                <div class="result" @click="pickAnime(r)" :title="r.russian">
                                    <img :src="'/api/image?url='+encodeURIComponent(r.poster_preview||r.poster_original)"
                                        loading="lazy" alt="" />
                                    <div class="add-badge" x-text="replaceCardUid ? '🔄' : '+'"></div>
                                    <div class="result-name" x-text="r.russian"></div>
                                </div>
                            </template>
                        </div>
                        <p class="hint">Клик по постеру — добавить карточку. ПКМ по карточке на слайде — заменить аниме.</p>
                    </section>

                    <section class="section">
                        <h3>Шапка слайда</h3>
                        <div class="row" style="gap:16px;flex-wrap:wrap">
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showLogo" /> Логотип
                            </label>
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showUrl" /> Сайт
                            </label>
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showRank" /> Номера
                            </label>
                            <label class="row" style="gap:6px;cursor:pointer">
                                <input type="checkbox" x-model="slide.showCaption" @change="autoArrange()" /> Названия
                            </label>
                        </div>
                        <div class="field" style="margin-top:10px">
                            <label>Фон</label>
                            <select x-model="slide.bg">
                                <template x-for="(val,name) in bgPresets" :key="name">
                                    <option :value="val" x-text="name"></option>
                                </template>
                            </select>
                        </div>
                    </section>

                    <section class="section">
                        <h3>Призыв и сайт (сверху)</h3>
                        <label class="row" style="gap:6px;cursor:pointer;margin-bottom:8px">
                            <input type="checkbox" x-model="slide.showSides" /> Показывать призыв
                        </label>
                        <div class="field">
                            <label>Призыв (сверху, над сайтом)</label>
                            <input type="text" x-model="slide.sideText" />
                        </div>
                        <div class="field">
                            <label>Сайт (красным, сверху справа)</label>
                            <input type="text" x-model="slide.siteUrl" />
                        </div>
                    </section>

                    <section class="section">
                        <h3>Раскладка</h3>
                        <p class="hint" style="margin:0 0 10px">Размер карточек общий для всех слайдов — задаётся ползунком «Размер» или углом карточки.</p>
                        <div class="field">
                            <label>Колонок: <span x-text="slide.cols"></span></label>
                            <input type="range" min="1" max="4" step="1" x-model.number="slide.cols"
                                @input="autoArrange()" />
                        </div>
                        <div class="field">
                            <label>Отступ между: <span x-text="slide.gap"></span> px</label>
                            <input type="range" min="0" max="120" step="4" x-model.number="slide.gap"
                                @input="autoArrange()" />
                        </div>
                        <div class="field">
                            <label>Поля по краям: <span x-text="slide.pad"></span> px</label>
                            <input type="range" min="0" max="160" step="4" x-model.number="slide.pad"
                                @input="autoArrange()" />
                        </div>
                        <div class="field">
                            <label>Отступ под шапкой: <span x-text="slide.headerH"></span> px</label>
                            <input type="range" min="0" max="500" step="10" x-model.number="slide.headerH"
                                @input="autoArrange()" />
                        </div>
                        <button class="btn btn-primary" style="width:100%" @click="autoArrange()">⊞ Выровнять ровно по центру</button>
                        <p class="hint">Карточки выравниваются идеально ровно: ряды по центру, равные отступы, одинаковый размер. Между выравниваниями двигаются мышкой свободно, угол тянет за размер.</p>
                    </section>

                    <section class="section" x-show="slide.cards.length">
                        <h3>Карточки (<span x-text="slide.cards.length"></span>)</h3>
                        <div class="card-list">
                            <template x-for="(c,idx) in slide.cards" :key="c.uid">
                                <div class="card-row" draggable="true"
                                    :class="{selected: c.uid===selectedCardUid, 'drag-src': cardDragIdx===idx, 'drag-over': cardOverIdx===idx}"
                                    @click="selectCard(c.uid)"
                                    @dragstart="cardDragIdx=idx"
                                    @dragover.prevent="cardOverIdx=idx"
                                    @drop.prevent="dropCard(idx)"
                                    @dragend="cardDragIdx=null; cardOverIdx=null">
                                    <span class="drag-handle" title="Перетащи, чтобы поменять местами">⠿</span>
                                    <input type="number" class="rank-input" x-model.number="c.rank"
                                        @click.stop draggable="false" title="Номер на карточке (можно менять)" />
                                    <img :src="c.poster" alt="" draggable="false" />
                                    <input type="text" x-model="c.name" @click.stop draggable="false" />
                                    <button class="btn btn-icon btn-sm" @click.stop="startReplace(c.uid)"
                                        :class="{'btn-primary': c.uid===replaceCardUid}" title="Заменить аниме (поиск)">🔄</button>
                                    <button class="btn btn-icon btn-sm" @click.stop="removeCard(c.uid)" title="Удалить">✕</button>
                                </div>
                            </template>
                        </div>
                    </section>

                    <template x-if="selectedCard">
                        <section class="section">
                            <h3>Выбранная карточка</h3>
                            <div class="field">
                                <label>Размер (общий для всех слайдов): <span x-text="Math.round(globalCardW)"></span> px</label>
                                <input type="range" min="140" max="900" step="10"
                                    :value="globalCardW"
                                    @input="equalizeCards(parseInt($event.target.value))" />
                            </div>
                            <button class="btn" style="width:100%" @click="centerSelectedX()">↔ Центрировать по горизонтали</button>
                        </section>
                    </template>
                </div>
            </template>

            <!-- ====== АРТЫ / КАРТИНКИ (для любого слайда) ====== -->
            <template x-if="slide">
                <section class="section">
                    <h3>Арты / картинки</h3>
                    <label class="btn btn-primary" style="width:100%">
                        + Загрузить арт
                        <input type="file" accept="image/*" multiple hidden
                            @change="addArtFiles($event.target.files); $event.target.value=''" />
                    </label>
                    <p class="hint">Добавь свою картинку (постер, скрин, арт) и двигай её по слайду — например сбоку. Тянется за угол, прилипает к сетке.</p>

                    <template x-if="slide.arts && slide.arts.length">
                        <div class="card-list">
                            <template x-for="a in slide.arts" :key="a.uid">
                                <div class="card-row" :class="{selected: a.uid===selectedArtUid}"
                                    @click="selectedArtUid=a.uid; selectedCardUid=null">
                                    <img :src="a.src" alt="" style="width:34px;height:34px;object-fit:cover" />
                                    <span class="muted" style="flex:1">арт</span>
                                    <button class="btn btn-icon btn-sm" @click.stop="removeArt(a.uid)" title="Удалить">✕</button>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="selectedArt">
                        <div class="field" style="margin-top:10px">
                            <label>Размер арта: <span x-text="selectedArt ? Math.round(selectedArt.w) : ''"></span> px</label>
                            <input type="range" min="80" max="2160" step="10"
                                :value="selectedArt ? selectedArt.w : 300"
                                @input="selectedArt && (selectedArt.w = parseInt($event.target.value))" />
                        </div>
                    </template>
                </section>
            </template>
        </aside>

        <!-- ================= СЦЕНА ================= -->
        <main class="stage">
            <div class="stage-toolbar">
                <button class="btn btn-sm" @click="duplicateSlide()">⧉ Дублировать слайд</button>
                <button class="btn btn-sm" @click="moveSlide(current,-1)" :disabled="current===0">← Влево</button>
                <button class="btn btn-sm" @click="moveSlide(current,1)"
                    :disabled="current===slides.length-1">Вправо →</button>
                <div class="topbar-spacer"></div>
                <span class="muted">Слайд <span x-text="current+1"></span> / <span x-text="slides.length"></span>
                    · <span x-text="dims.w + '×' + dims.h"></span></span>
            </div>

            <div class="stage-canvas-wrap" x-ref="canvasWrap"
                @pointerdown.self="selectedCardUid=null; selectedArtUid=null">

                <!-- ПОЛНОРАЗМЕРНЫЙ СЛАЙД -->
                <div class="slide" x-ref="slideNode" :class="{exporting: exporting}"
                    :style="`width:${dims.w}px;height:${dims.h}px;` +
                            `transform:translate(-50%,-50%) scale(${scale});` +
                            `background:${slide ? slide.bg : '#111'};`">

                    <!-- СЛОЙ АРТОВ (под контентом, для любого слайда) -->
                    <template x-for="a in (slide && slide.arts) ? slide.arts : []" :key="a.uid">
                        <div class="art"
                            :class="{selected: a.uid===selectedArtUid, dragging: dragInfo && dragInfo.obj===a}"
                            :style="`left:${a.x}px;top:${a.y}px;width:${a.w}px`"
                            @pointerdown.stop="startDrag($event, a, 'move', 'art')">
                            <img :src="a.src" alt="" draggable="false" />
                            <div class="resize-handle"
                                @pointerdown.stop="startDrag($event, a, 'resize', 'art')"></div>
                        </div>
                    </template>

                    <!-- ЕДИНЫЙ БРЕНДБАР: логотип слева, справа призыв + сайт.
                         Одна и та же позиция на ВСЕХ слайдах (титул + грид):
                         призыв сверху, AMIRAI.ONLINE строго под ним. -->
                    <div class="brandbar" x-show="slide && (slide.showLogo || slide.showUrl || slide.showSides)">
                        <img class="bb-logo" x-show="slide && slide.showLogo" src="/img/logo.png" alt="" />
                        <div class="bb-right">
                            <div class="bb-cta" x-show="slide && slide.showSides && slide.sideText"
                                x-text="slide.sideText"></div>
                            <div class="bb-url site-url" x-show="slide && slide.showUrl" x-text="slide.siteUrl"></div>
                        </div>
                    </div>

                    <!-- ТИТУЛЬНЫЙ (обложка) -->
                    <template x-if="slide && slide.type==='title'">
                        <div class="cover">
                            <div class="cover-number" x-show="slide.showNumber"
                                :class="'num-pos-'+slide.numPos+' num-'+slide.numStyle"
                                :style="slide.numStyle==='outline'
                                    ? `-webkit-text-stroke-color:${slide.numColor}`
                                    : `color:${slide.numColor}`">
                                <template x-for="(ch,i) in numberChars" :key="i">
                                    <span class="digit">
                                        <span class="num-char" x-text="ch"></span>
                                        <svg class="digit-sketch" x-show="slide.numStyle==='scribble' && sketchFor(ch)"
                                            viewBox="0 0 100 150" preserveAspectRatio="none" aria-hidden="true">
                                            <path :d="sketchFor(ch)" fill="none" stroke="#ffffff"
                                                stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
                                        </svg>
                                    </span>
                                </template>
                            </div>

                            <div class="cover-bottom">
                                <h1 x-text="slide.title"></h1>
                                <div class="subtitle" x-show="slide.subtitle" x-text="slide.subtitle"></div>
                            </div>
                        </div>
                    </template>

                    <!-- СЕТКА -->
                    <template x-if="slide && slide.type==='grid'">
                        <div style="position:absolute;inset:0">

                            <template x-for="(c,idx) in slide.cards" :key="c.uid">
                                <div class="acard"
                                    :class="{selected: c.uid===selectedCardUid, dragging: dragInfo && dragInfo.obj===c}"
                                    :style="`left:${c.x}px;top:${c.y}px;width:${c.w}px`"
                                    @pointerdown.stop="startDrag($event, c, 'move')"
                                    @contextmenu.prevent="startReplace(c.uid)">
                                    <div class="rank" x-show="slide.showRank"
                                        :style="`font-size:${c.w*0.16}px;min-width:${c.w*0.2}px;height:${c.w*0.2}px`"
                                        x-text="c.rank != null ? c.rank : (idx+1)"></div>
                                    <img class="poster" :src="c.poster" alt="" crossorigin="anonymous" />
                                    <div class="caption" x-show="slide.showCaption"
                                        :style="`height:${c.w*0.22}px;font-size:${Math.round(c.w*0.085)}px`"
                                        x-text="c.name"></div>
                                    <div class="resize-handle"
                                        @pointerdown.stop="startDrag($event, c, 'resize')"></div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ================= ЛЕНТА СЛАЙДОВ ================= -->
            <div class="slides-strip">
                <template x-for="(s,i) in slides" :key="s.id">
                    <div class="thumb" :class="{active: i===current}" @click="selectSlide(i)"
                        :style="`aspect-ratio:${dims.w}/${dims.h}`">
                        <span class="thumb-index" x-text="(i+1) + (s.type==='title' ? ' · титул' : '')"></span>
                        <button class="thumb-del" @click.stop="removeSlide(i)">✕</button>
                        <span x-text="s.type==='grid' ? (s.cards.length + ' аниме') : 'титул'"></span>
                    </div>
                </template>
                <button class="add-slide" @click="addSlide('grid')">+ Сетка</button>
                <button class="add-slide" @click="addSlide('title')">+ Титул</button>
            </div>
        </main>
    </div>

    <!-- toast -->
    <div class="toast" x-show="toast" x-transition x-text="toast"></div>
</body>
</html>
